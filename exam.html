<!DOCTYPE html>
<html>

<head>
<title>Mock Test</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

#timer{
font-size:24px;
color:red;
margin:20px;
}

#question img{
width:700px;
}

.options{
margin-top:20px;
font-size:18px;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:16px;
}

</style>

</head>

<body>

<h2>Mock Test</h2>

<div id="timer">03:00:00</div>

<div id="question">
<img src="exams/jee/mock1/images/q1.png">
</div>

<div class="options">

<label><input type="radio" name="option"> A</label><br><br>
<label><input type="radio" name="option"> B</label><br><br>
<label><input type="radio" name="option"> C</label><br><br>
<label><input type="radio" name="option"> D</label>

</div>

<button onclick="nextQuestion()">Next Question</button>

<script>

let current = 1;
let total = 75;

function nextQuestion(){

current++;

if(current<=total){

document.getElementById("question").innerHTML =
'<img src="exams/jee/mock1/images/q'+current+'.png">';

}

}

let time = 10800;

setInterval(function(){

time--;

let h = Math.floor(time/3600);
let m = Math.floor((time%3600)/60);
let s = time%60;

document.getElementById("timer").innerHTML =
h+":"+m+":"+s;

},1000);

<script src="script.js"></script>

</body>
</html>
